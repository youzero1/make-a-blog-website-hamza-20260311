version: "3.8"

services:
  blog-app:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "3000:3000"
    volumes:
      - blog-data:/app/data
    env_file:
      - .env
    environment:
      - NODE_ENV=production
      - DATABASE_PATH=/app/data/blog.sqlite
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3000/api/posts"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

volumes:
  blog-data:
    driver: local
